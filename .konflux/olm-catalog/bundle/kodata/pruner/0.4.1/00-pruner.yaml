kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: tekton-pruner-controller-cluster-access
  labels:
    pruner.tekton.dev/release: "v0.4.1"
rules:
  # Write permissions to publish events.
  - apiGroups:
      - ""
    resources:
      - "events"
    verbs:
      - "create"
      - "update"
      - "patch"
  # allows to manage taskruns and pipelineruns
  - apiGroups:
      - "tekton.dev"
    resources:
      - "taskruns"
      - "pipelineruns"
      - "taskruns/finalizers"
      - "pipelineruns/finalizers"
    verbs:
      - "get"
      - "list"
      - "create"
      - "update"
      - "delete"
      - "patch"
      - "watch"
  # used in webhook
  - apiGroups:
      - admissionregistration.k8s.io
    resources:
      - mutatingwebhookconfigurations
      - validatingwebhookconfigurations
    verbs:
      - get
      - list
      - create
      - update
      - delete
      - patch
      - watch
  # used in webhook
  - apiGroups:
      - ""
    resources:
      - namespaces
    verbs:
      - get
      - list
      - create
      - update
      - delete
      - patch
      - watch
  - apiGroups:
      - ""
    resources:
      - namespaces/finalizers
    verbs:
      - update
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - list
      - watch
  # permissions restricted to specific ConfigMap
  - apiGroups:
      - ""
    resources:
      - configmaps
    resourceNames:
      - tekton-pruner-namespace-spec
    verbs:
      - get
  # used in webhook for certificate management
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch

