name: operator-update-images

on:
  pull_request:
  push:
    branches:
      - next
      - release-v*
    paths:
      - project.yaml
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select Environment'
        required: true
        default: 'devel'
        type: choice
        options:
          - devel
          - staging
          - production

jobs:
  update-csv:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'openshift-pipelines' # do not run this elsewhere
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout the current repo
        uses: actions/checkout@v5

      - name: fetch-payload
        run: |
          # Operator SDK
          export OPERATOR_SDK_DL_URL=https://github.com/operator-framework/operator-sdk/releases/download/v1.37.0/operator-sdk_linux_amd64
          curl -LO ${OPERATOR_SDK_DL_URL}
          chmod +x operator-sdk_linux_amd64 && sudo mv operator-sdk_linux_amd64 /usr/local/bin/operator-sdk
          
          operator-sdk version
          
          # Python with requirements (yaml here)
          # We could migrate to go...
          python3 -m venv sync-sources
          source sync-sources/bin/activate
          pip3 install -r requirements.txt
          
          # Update operator's payload and stuff
          make update-payload-and-reference ENVIRONMENT=${{github.event.inputs.environment}} 

      - name: Commit new changes
        run: |
          BASE_BRANCH=${GITHUB_REF#refs/heads/}
          SOURCE_BRANCH=actions/update/operator-update-images-${BASE_BRANCH}
          git config user.name openshift-pipelines-bot
          git config user.email pipelines-extcomm@redhat.com
          git checkout -b ${SOURCE_BRANCH}
          
          git add -f  head .konflux olm
          
          if [[ -z $(git status --porcelain --untracked-files=no) ]]; then
            echo "No change, exiting"
            exit 0
          fi
          
          git commit -F- <<EOF
            [bot:${BASE_BRANCH}] Update  generate Cluster Service Version (CSV)
          EOF
          
          git push -f origin ${SOURCE_BRANCH}
          pr_list=$(gh pr list --base ${BASE_BRANCH} --head ${SOURCE_BRANCH} --json number)
          echo "Waiting for 10s before updating PRs"
          sleep 10
          if [ "$(echo $pr_list | jq length)" = "0" ]; then
            echo "creating PR..."
            gh pr create -B ${BASE_BRANCH} -H ${SOURCE_BRANCH} --label=automated --label=lgtm --label=approved  --fill
          else
            echo "a PR already exists, editing..."
            gh pr edit $(echo $pr_list | jq .[0].number) --add-label=lgtm  --add-label=approved 
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
